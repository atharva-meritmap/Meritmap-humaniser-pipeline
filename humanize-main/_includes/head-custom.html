<!-- SEO: author, keywords, canonical, robots -->
<meta name="author" content="Meritmap">
<meta name="keywords" content="{{ site.keywords }}">
<meta name="robots" content="index,follow">
<link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url | replace:'index.html','' }}">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
<meta property="og:locale" content="en_US">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">

<meta name="theme-color" content="#181717">

<!-- Schema.org -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareSourceCode",
  "name": "Meritmap Detection Research",
  "description": "{{ site.description }}",
  "programmingLanguage": "Markdown",
  "url": "{{ site.url }}{{ site.baseurl }}",
  "license": "https://opensource.org/licenses/MIT",
  "author": {
    "@type": "Organization",
    "name": "Meritmap",
    "url": "https://meritmap.io"
  },
  "keywords": "{{ site.keywords }}"
}
</script>
