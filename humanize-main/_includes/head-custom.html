<!-- Google Search Console verification -->
{% if site.google_site_verification %}
<meta name="google-site-verification" content="{{ site.google_site_verification }}">
{% endif %}

<!-- SEO: author, keywords, canonical, robots -->
{% if site.author %}<meta name="author" content="{{ site.author }}">{% endif %}
{% if site.keywords %}<meta name="keywords" content="{{ site.keywords }}">{% endif %}
<meta name="robots" content="index,follow">
<link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url | replace:'index.html','' }}">

<!-- Open Graph (Facebook, LinkedIn, Slack, Discord, iMessage previews) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
{% if site.og_image %}<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}{{ site.og_image }}">
<meta property="og:image:width" content="1280">
<meta property="og:image:height" content="640">{% endif %}
<meta property="og:locale" content="en_US">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
{% if site.twitter_username %}<meta name="twitter:site" content="@{{ site.twitter_username }}">
<meta name="twitter:creator" content="@{{ site.twitter_username }}">{% endif %}
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
{% if site.og_image %}<meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}{{ site.og_image }}">{% endif %}

<!-- Browser chrome color (mobile) -->
<meta name="theme-color" content="#181717">

<!-- Favicon (drop a favicon.ico in repo root to enable) -->
<link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/favicon.ico">

<!-- Schema.org structured data (helps with rich Google results) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareSourceCode",
  "name": "humanize",
  "alternateName": ["humanize ai skill", "ai text humanizer", "claude humanize skill", "ai-check"],
  "description": "{{ site.description }}",
  "codeRepository": "https://github.com/{{ site.repository }}",
  "programmingLanguage": "Markdown",
  "runtimePlatform": ["Claude Code", "Codex CLI", "ChatGPT", "Gemini", "Cursor", "Aider"],
  "url": "{{ site.url }}{{ site.baseurl }}",
  "license": "https://opensource.org/licenses/MIT",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Cross-platform",
  {% if site.author %}"author": {
    "@type": "Person",
    "name": "{{ site.author }}"{% if site.author_url %},
    "url": "{{ site.author_url }}"{% endif %}
  },{% endif %}
  "keywords": "{{ site.keywords }}"
}
</script>

<!-- FAQ structured data (Google's FAQ rich results) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is a humanize skill?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A humanize skill is a set of rules an LLM agent follows to rewrite AI-generated text so it reads as if a person wrote it. This repo provides humanize (the rewriter) and ai-check (a forensic AI-detection scorer), both as static rule-based skills derived from 50+ peer-reviewed AI-text-detection papers."
      }
    },
    {
      "@type": "Question",
      "name": "How do I install a humanize skill in Claude Code, Codex CLI, or ChatGPT?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Clone the repo and run ./install.sh all to install to all three agent skills directories. Or pick a single target: ./install.sh claude, ./install.sh codex, ./install.sh chatgpt. For Claude Desktop or web chat agents, upload the SKILL.md files through Settings or paste them as a system prompt."
      }
    },
    {
      "@type": "Question",
      "name": "Does this humanize skill beat GPTZero or Grammarly?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. Static rule-based humanization defeats perplexity-based detectors but not learned classifiers like GPTZero, Grammarly, or Pangram. The README documents what closes that gap: cross-model paraphrase, base-model rewriting, and manual edits."
      }
    },
    {
      "@type": "Question",
      "name": "What is the difference between humanize and ai-check?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "humanize rewrites AI text to read as human. ai-check does the reverse: it takes any text and produces a forensic AI-detection report with nine signal categories, evidence-quoted flags, a verdict, confidence level, and AI-edited-fraction estimate."
      }
    }
  ]
}
</script>
