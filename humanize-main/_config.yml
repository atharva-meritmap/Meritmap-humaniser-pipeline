title: "Meritmap Detection Research — Humanisation Signal Library"
description: "Research-grounded signal library for AI text humanisation and detection. Humanize and ai-check skills for any LLM agent. Grounded in 50+ peer-reviewed papers."
url: "https://meritmap.io"
baseurl: "/detection-research"
lang: en

author: Meritmap
author_url: "https://meritmap.io"

keywords: "AI text humaniser, AI detection, GPT detector, academic humanisation, LaTeX humaniser, AI writing detection, anti-AI-detection, RLHF detection, q1 journal"

theme: jekyll-theme-cayman

markdown: kramdown
plugins:
  - jekyll-relative-links
  - jekyll-sitemap
  - jekyll-seo-tag
relative_links:
  enabled: true
  collections: true
include:
  - README.md

defaults:
  - scope:
      path: "README.md"
    values:
      permalink: /

exclude:
  - tests/
  - bench/
